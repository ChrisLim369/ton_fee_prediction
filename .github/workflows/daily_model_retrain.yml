name: Manual TON Model Retrain

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0'   # UTC Sunday 16:00 = KST Monday 01:00, weekly

permissions:
  contents: write
  actions: write

concurrency:
  group: ton-raw-data-refresh
  cancel-in-progress: false

jobs:
  daily-model-retrain:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore raw transaction cache
        id: raw-cache
        uses: actions/cache/restore@v4
        with:
          path: raw_transactions.csv
          key: ton-raw-transactions-${{ github.run_id }}
          restore-keys: |
            ton-raw-transactions-

      - name: Validate raw transaction cache
        run: |
          python - <<'PY'
          import csv
          import os
          import time
          from pathlib import Path

          path = Path("raw_transactions.csv")
          valid = False
          if path.exists():
              with path.open(newline="", encoding="utf-8") as handle:
                  reader = csv.DictReader(handle)
                  first_now = None
                  last_now = None
                  rows = 0
                  for row in reader:
                      rows += 1
                      now = int(float(row.get("now") or 0))
                      first_now = now if first_now is None else first_now
                      last_now = now
              earliest = int(time.time()) - 90 * 24 * 60 * 60
              latest = int(time.time()) + 24 * 60 * 60
              valid = rows >= 100000 and first_now is not None and earliest <= first_now <= latest and earliest <= last_now <= latest

          if not valid:
              path.unlink(missing_ok=True)
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
                  env.write("RAW_CACHE_VALID=false\n")
          PY

      - name: Refresh raw data and hourly features before retraining
        env:
          TONCENTER_API_KEY: ${{ secrets.TONCENTER_API_KEY }}
        run: |
          python src/refresh_forecast_outputs.py \
            --recent-raw raw_transactions.csv \
            --recent-status .automation_raw_last_updated.json \
            --use-raw-latest-state \
            --preserve-raw \
            --bootstrap-days 3 \
            --limit 1000 \
            --max-pages-per-window 1 \
            --workchain 0 \
            --stream

      - name: Save raw transaction cache
        uses: actions/cache/save@v4
        if: success() && hashFiles('raw_transactions.csv') != ''
        with:
          path: raw_transactions.csv
          key: ton-raw-transactions-${{ github.run_id }}

      - name: Retrain model suite
        run: python src/train_model.py

      - name: Regenerate forecast with retrained model
        run: python src/generate_forecast.py

      - name: Track operational forecast accuracy
        run: python src/track_accuracy.py

      - name: Regenerate charts
        run: python scripts/generate_charts.py

      - name: Fail on degraded refresh
        run: |
          if jq -e '.status == "degraded"' last_updated.json; then
            exit 1
          fi

      - name: Mirror static data for Cloudflare Pages
        run: |
          mkdir -p docs/data/models
          cp predictions.csv hourly_features.csv last_updated.json collection_metadata.json actual_vs_predicted.csv docs/data/
          cp forecast_log.csv forecast_accuracy.csv docs/data/
          cp models/best_model.json models/model_metrics.json models/model_comparison.csv models/rolling_backtest.csv docs/data/models/
          cp models/operational_metrics.json docs/data/models/

      - name: Commit refreshed lightweight model and forecast outputs
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- models/best_model.json
          git add -- models/model_metrics.json models/model_comparison.csv models/rolling_backtest.csv
          git add -- models/rolling_backtest_folds.csv models/model_coefficients.csv models/feature_importance.csv
          git add -- actual_vs_predicted.csv hourly_features.csv predictions.csv last_updated.json collection_metadata.json
          git add -- forecast_log.csv forecast_accuracy.csv models/operational_metrics.json docs/operational_accuracy.md
          git add -- docs/model_evaluation_report.md docs/figures/*.svg docs/figures/*.png
          git add -- docs/data/
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No lightweight model or forecast output changes to commit."
          else
            git commit -m "Update TON manual model outputs"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi
