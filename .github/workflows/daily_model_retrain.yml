name: Manual TON Model Retrain

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: ton-raw-data-refresh
  cancel-in-progress: false

jobs:
  daily-model-retrain:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore raw transaction cache
        id: raw-cache
        uses: actions/cache/restore@v4
        with:
          path: raw_transactions.csv
          key: ton-raw-transactions-${{ github.run_id }}
          restore-keys: |
            ton-raw-transactions-

      - name: Refresh raw data and hourly features before retraining
        env:
          TONCENTER_API_KEY: ${{ secrets.TONCENTER_API_KEY }}
        run: |
          python src/refresh_forecast_outputs.py \
            --recent-raw raw_transactions.csv \
            --recent-status .automation_raw_last_updated.json \
            --use-raw-latest-state \
            --preserve-raw \
            --bootstrap-days 3 \
            --limit 1000 \
            --max-pages-per-window 1 \
            --workchain 0 \
            --stream

      - name: Save raw transaction cache
        uses: actions/cache/save@v4
        if: success() && hashFiles('raw_transactions.csv') != ''
        with:
          path: raw_transactions.csv
          key: ton-raw-transactions-${{ github.run_id }}

      - name: Retrain model suite
        run: python src/train_model.py

      - name: Regenerate forecast with retrained model
        run: python src/generate_forecast.py

      - name: Regenerate charts
        run: python scripts/generate_charts.py

      - name: Commit refreshed lightweight model and forecast outputs
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- models/best_model.json
          git add -- models/model_metrics.json models/model_comparison.csv models/rolling_backtest.csv
          git add -- models/rolling_backtest_folds.csv models/model_coefficients.csv models/feature_importance.csv
          git add -- actual_vs_predicted.csv hourly_features.csv predictions.csv last_updated.json collection_metadata.json
          git add -- docs/model_evaluation_report.md docs/figures/*.svg docs/figures/*.png
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No lightweight model or forecast output changes to commit."
          else
            git commit -m "Update TON manual model outputs"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi
