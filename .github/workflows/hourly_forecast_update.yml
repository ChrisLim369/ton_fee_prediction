name: Hourly TON Forecast Update

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: ton-raw-data-refresh
  cancel-in-progress: false

jobs:
  hourly-forecast-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore raw transaction cache
        id: raw-cache
        uses: actions/cache/restore@v4
        with:
          path: raw_transactions.csv
          key: ton-raw-transactions-${{ github.run_id }}
          restore-keys: |
            ton-raw-transactions-

      - name: Refresh raw data, hourly features, and forecast
        env:
          TONCENTER_API_KEY: ${{ secrets.TONCENTER_API_KEY }}
        run: |
          python src/refresh_forecast_outputs.py \
            --recent-raw raw_transactions.csv \
            --recent-status .automation_raw_last_updated.json \
            --use-raw-latest-state \
            --preserve-raw \
            --bootstrap-days 3 \
            --limit 1000 \
            --max-pages-per-window 1 \
            --workchain 0 \
            --stream

      - name: Save raw transaction cache
        uses: actions/cache/save@v4
        if: success() && hashFiles('raw_transactions.csv') != ''
        with:
          path: raw_transactions.csv
          key: ton-raw-transactions-${{ github.run_id }}

      - name: Regenerate charts
        run: python scripts/generate_charts.py

      - name: Commit refreshed lightweight outputs
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- hourly_features.csv predictions.csv last_updated.json collection_metadata.json
          git add -- docs/figures/*.svg docs/figures/*.png
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No lightweight forecast output changes to commit."
          else
            git commit -m "Update TON hourly forecast outputs"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Netlify build hook
        if: steps.commit.outputs.committed == 'true'
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -n "${NETLIFY_BUILD_HOOK_URL:-}" ]; then
            curl -fsS -X POST "$NETLIFY_BUILD_HOOK_URL" >/dev/null
          else
            echo "NETLIFY_BUILD_HOOK_URL is not configured; relying on Git-connected Netlify deploys."
          fi
